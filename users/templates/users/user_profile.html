{% extends "home/base.html" %}

{% block content %}

<div class="container py-5">

    <div class="row">

        <div class="col-lg-4">

            <div class="card border-0 shadow rounded-4 text-center">

                <div class="card-body p-4">

                    <img src="{{ profile.image.url }}"
                         class="rounded-circle mb-3"
                         width="140"
                         height="140">

                    <h4 class="fw-bold">
                        {{ user.username }}
                    </h4>

                    <p class="text-muted">
                        {{ user.email }}
                    </p>

                </div>

            </div>

        </div>

        <div class="col-lg-8">

            <div class="card border-0 shadow rounded-4">

                <div class="card-body p-5">

                    <h3 class="fw-bold mb-4">
                        Profil Bilgileri
                    </h3>

                    <div class="row g-4">

                        <div class="col-md-6">
                            <strong>Telefon:</strong><br>
                            {{ profile.phone }}
                        </div>

                        <div class="col-md-6">
                            <strong>Şehir:</strong><br>
                            {{ profile.city }}
                        </div>

                        <div class="col-md-6">
                            <strong>Ülke:</strong><br>
                            {{ profile.country }}
                        </div>

                        <div class="col-md-6">
                            <strong>Dil:</strong><br>
                            {{ profile.language }}
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
