{% extends "home/base.html" %}

{% block content %}

<div class="container">

    <h2 class="mb-4">
        {{ category.title }}
    </h2>

    <div class="row">

        {% for item in children %}

            <div class="col-md-4 mb-4">

                <div class="card shadow-sm border-0 rounded-4 h-100">

                    {% if item.image %}
                        <img src="{{ item.image.url }}"
                             class="card-img-top"
                             style="height:220px; object-fit:cover;">
                    {% endif %}

                    <div class="card-body">

                        <h5 class="card-title">
                            {{ item.title }}
                        </h5>

                        <p class="text-muted">
                            {{ item.description|truncatechars:80 }}
                        </p>

                        <a href="{% url 'category_detail' item.slug %}"
                           class="btn btn-dark rounded-3">

                            Kategoriye Git

                        </a>

                    </div>

                </div>

            </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
