{% load mptt_tags %}

<div class="card shadow-sm border-0 rounded-4">

    <!-- Header -->
    <div class="card-header bg-dark text-white py-3 rounded-top-4">
        <h5 class="mb-0 fw-bold">
            <i class="bi bi-grid-fill me-2"></i>
            Kategoriler
        </h5>
    </div>

    <!-- Sidebar -->
    <div class="category-sidebar">

        {% recursetree categorys %}

            <div class="category-item">

                <!-- CATEGORY ROW -->
                <div class="category-link-wrapper">

                    <!-- CATEGORY LINK -->
                    <a href="{% url 'category_detail' node.slug %}"
                       class="category-link flex-grow-1">

                        <span>

                            {% if node.is_leaf_node %}
                                <i class="bi bi-tag me-2 text-secondary"></i>
                            {% else %}
                                <i class="bi bi-folder2-open me-2 text-primary"></i>
                            {% endif %}

                            {{ node.title }}

                        </span>

                    </a>

                    <!-- SUBMENU TOGGLE -->
                    {% if not node.is_leaf_node %}

                        <a href="#submenu-{{ node.id }}"
                           class="submenu-toggle"
                           data-bs-toggle="collapse">

                            <i class="bi bi-chevron-right small"></i>

                        </a>

                    {% endif %}

                </div>

                <!-- CHILDREN -->
                {% if not node.is_leaf_node %}

                    <div class="subcategory collapse"
                         id="submenu-{{ node.id }}">

                        {{ children }}

                    </div>

                {% endif %}

            </div>

        {% endrecursetree %}

    </div>

</div>
