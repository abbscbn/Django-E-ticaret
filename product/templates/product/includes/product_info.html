<div class="ps-lg-4">

    <!-- TITLE -->
    <h1 class="fw-bold mb-3">
        {{ product.title }}
    </h1>

    <!-- STOCK -->
    <div class="mb-3">

        <span class="badge bg-success px-3 py-2">

            Stok:
            {{ active_variant.quantity|default:product.quantity }}

        </span>

    </div>

    <!-- PRICE -->
    <h2 class="fw-bold text-dark mb-4">

        ₺{{ active_variant.price|default:product.price }}

    </h2>

    <!-- DESCRIPTION -->
    <div class="text-muted mb-4">
        {{ product.description }}
    </div>

    {% if variants %}

        <!-- SIZE -->
        <div class="mb-4">

            <label class="form-label fw-semibold">
                Beden Seç
            </label>

            <div class="d-flex flex-wrap gap-2">

                {% for size in sizes %}

                    <button
                        type="button"
                        class="btn btn-outline-dark size-btn"
                        data-size="{{ size.id }}">

                        {{ size.name }}

                    </button>

                {% endfor %}

            </div>

        </div>

        <!-- COLOR -->
        <div class="mb-4">

            <label class="form-label fw-semibold">
                Renk Seç
            </label>

            <div
                class="d-flex flex-wrap gap-2"
                id="colorContainer">

            </div>

        </div>

    {% endif %}

    <!-- ADD TO CART -->
    <form method="post"
          action="{% url 'addtoshopcart' product.id %}">

        {% csrf_token %}

        {% if active_variant %}

            <input
                type="hidden"
                name="variantid"
                value="{{ active_variant.id }}">

        {% endif %}

        <div class="mb-4">

            <label class="form-label fw-semibold">
                Adet
            </label>

            <input type="number"
                   name="quantity"
                   value="1"
                   min="1"
                   class="form-control w-25">

        </div>

        <button type="submit"
                class="btn btn-dark btn-lg rounded-pill px-5">

            <i class="bi bi-cart-plus me-2"></i>
            Sepete Ekle

        </button>

    </form>

</div>
