<div class="ps-lg-4">

    <h1 class="fw-bold mb-3">
        {{ product.title }}
    </h1>

    <div class="mb-3">

        <span class="badge bg-success px-3 py-2">
            Stok: {{ product.amount }}
        </span>

    </div>

    <h2 class="fw-bold text-dark mb-4">
        ₺{{ product.price }}
    </h2>

    <div class="text-muted mb-4">
        {{ product.description }}
    </div>

    <!-- ADD TO CART -->
    <form method="post"
          action="{% url 'addtoshopcart' product.id %}">

        {% csrf_token %}

        <!-- VARIANT -->
        {% if product.variant != 'None' %}

            <div class="mb-4">

                <label class="form-label fw-semibold">
                    Varyant Seç
                </label>

                <select name="variantid"
                        class="form-select"
                        required>

                    {% for rs in variants %}

                        <option value="{{ rs.id }}">

                            {{ rs.title }}
                            - ₺{{ rs.price }}

                        </option>

                    {% endfor %}

                </select>

            </div>

        {% endif %}

        <!-- QUANTITY -->
        <div class="mb-4">

            <label class="form-label fw-semibold">
                Adet
            </label>

            <input type="number"
                   name="quantity"
                   value="1"
                   min="1"
                   class="form-control w-25">

        </div>

        <button type="submit"
                class="btn btn-dark btn-lg rounded-pill px-5">

            <i class="bi bi-cart-plus me-2"></i>
            Sepete Ekle

        </button>

    </form>

</div>
